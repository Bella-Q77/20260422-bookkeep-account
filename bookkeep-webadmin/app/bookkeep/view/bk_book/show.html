<body class="gray-bg">
<div class="wrapper wrapper-content animated ">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox">
                <div class="ibox-title">
                    <h5>{$page_title|default=''}</h5>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <form id="pagerForm" method="post" class="form-inline searchForm">
                            <div class="col-sm-12">
                                <div class="input-group">
                                    <select name="is_template" class="form-control">
                                        <option value="">{:lang('是否模板')}</option>
                                        <option value="1">{:lang('是')}</option>
                                        <option value="0">{:lang('否')}</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <input type="text" name="member_id" placeholder="{:lang('会员ID')}" class="form-control">
                                </div>
                                <div class="input-group">
                                    <input type="text" name="keywords" placeholder="{:lang('关键字搜索')}" class="form-control">
                                </div>
                                <div class="input-group">
                                    <span class="input-group-btn">
                                        <button type="button" class="btn btn-primary ajaxSearchForm"><i
                                                class="fa fa-search"></i> {:lang('查询')}</button></span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="ibox float-e-margins">
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-sm-12">
                            <lqf_link><a class="btn btn-info ajax-open" data-url="{:url('BkBook/add')}" width="800" height="600"><i
                                    class="fa fa-plus"></i> {:lang('添加')}</a></lqf_link>
                        </div>
                    </div>
                </div>
                <div class="ibox-content table-responsive">
                    <table class="table table-hover sorttable ajax-list-table" data-url="{:url('BkBook/show_json')}"
                           width="100%">
                        <thead>
                        <tr>
                            <th width="22"><input type="checkbox" group="ids" class="checkboxCtrl"></th>
                            <th width="50"><span>{:lang('账本ID')}</span></th>
                            <th width="200"><span>{:lang('账本名称')}</span></th>
                            <th width="80"><span>{:lang('描述')}</span></th>
                            <th width="80"><span>{:lang('默认币种')}</span></th>
                            <th width="80"><span>{:lang('会员ID')}</span></th>
                            <th width="80"><span>{:lang('排序')}</span></th>
                            <th width="80"  class="text-center">{:lang('是否模板')}</th>
                            <th width="80"  class="text-center">{:lang('是否默认')}</th>
                            <th width="80"  class="text-center">{:lang('操作')}</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>
                        <tfoot class="ibox-content">
                        <tr>
                            <td colspan="9" align="center"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script id="tableListTpl" type="text/html">
    <% for(var i=0;i<data.length;i++) {
    isdefault=''; if(data[i]['is_default']=='1') isdefault='checked';
    istemplate=''; if(data[i]['is_template']=='1') istemplate='checked';
    %>
    <tr>
        <td><input name="id" class="checkboxCtrlId" value="<%=data[i]['id']%>" type="checkbox"></td>
        <td><%=data[i]['id']%></td>
        <td><%=data[i]['name']%></td>
        <td><%=data[i]['remark']%> </td>
        <td><%=data[i]['currency']%></td>
        <td><%=data[i]['member_id']%></td>
        <td>
            <input type="text" name="sort" value="<%=data[i]['sort']%>" class="form-control w50 ajax-sort"
                   data-url="{:url('BkBook/set_sort',array('name'=>'sort'))}" data-id="<%=data[i]['id']%>" size="5">
        </td>
        <td class="text-center">
            <input name="is_template" class="ajax-checkbox" type="checkbox"
                   data-url="{:url('BkBook/set_visible',array('name'=>'is_template'))}"
                   data-id="<%=data[i]['id']%>"  <%=istemplate%> />
        </td>
        <td class="text-center">
            <input name="is_default" class="ajax-checkbox" type="checkbox"
                   data-url="{:url('BkBook/set_visible',array('name'=>'is_default'))}"
                   data-id="<%=data[i]['id']%>"  <%=isdefault%> />
        </td>
        <td class="text-center">
            <lqf_link><a class="ajax-open" data-url="{:url('BkCategory/show')}"
                         data-ids="{'book_id':'<%=data[i]['id']%>'}">{:lang('分类')}</a></lqf_link>
            <lqf_link><a class="ajax-open" data-url="{:url('BkBook/edit')}" width="800" height="600"
                         data-ids="{'id':'<%=data[i]['id']%>'}" data-title="{:lang('修改')}">{:lang('修改')}</a></lqf_link>
            <lqf_link><a class="ajax-del confirm" data-url="{:url('BkBook/del')}"
                         data-ids="{'id':'<%=data[i]['id']%>'}">{:lang('删除')}</a></lqf_link>
        </td>
    </tr>
    <% } %>
</script>
<script type="text/javascript">
    $(document).ready(function () {
        turnPage(1);
    });
</script>
