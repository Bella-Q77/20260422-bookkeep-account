<div class="ibox-content auto-height-box">
    <form class="form-horizontal" method="post" action="{:url('BkPerson/add')}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('人员名称')}</label>
            <div class="col-sm-10">
                <input name="name" class="form-control" type="text"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('性别')}</label>
            <div class="col-sm-10">
                <select name="gender" class="form-control">
                    <option value="male">{:lang('男')}</option>
                    <option value="female">{:lang('女')}</option>
                </select>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('联系电话')}</label>
            <div class="col-sm-10">
                <input name="phone" class="form-control" type="text" placeholder="" value="{$info.phone|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('邮箱')}</label>
            <div class="col-sm-10">
                <input name="email" class="form-control" type="text" placeholder="" value="{$info.email|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('排序')}</label>
            <div class="col-sm-10">
                <input name="sort" class="form-control" type="text" placeholder="" value="{$info.sort|default='0'}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('备注说明')}</label>
            <div class="col-sm-10">
                <textarea name="remark" class="form-control" rows="3">{$info.remark|default=''}</textarea>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
