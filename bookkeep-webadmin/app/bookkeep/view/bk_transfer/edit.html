<div class="ibox-title">{:lang('修改记录')}</div>
<div class="ibox-content auto-height-box">
    <form class="form-horizontal" method="post" action="{:url('BkTransfer/edit')}">
        <input type="hidden" name="id" value="{$info.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('转出账户')}</label>
            <div class="col-sm-8">
                <div class="suggest-search-box">
                    <div class="input-group from-account-suggest">
                        <input type="hidden" name="from_account_id" value="{$info.from_account_id|default=''}">
                        <input type="text" name="from_account_name"
                               value="{$info.from_account_name|default=''}"
                               class="form-control suggest-input" placeholder="{:lang('选择账户')}"
                               data-url="{:url('Comm/suggest_search',array('datatype'=>'account','type'=>'1'))}"
                               searchFields="keywords"
                               target-group="from-account-suggest"
                               target-name='{"from_account_id":"id","from_account_name":"name"}'>
                        <div class="input-group-btn">
                            <button type="button" class="btn btn-default dropdown-toggle"
                                    data-toggle="dropdown">
                                <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-right" role="menu"></ul>
                        </div>
                    </div>
                </div>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('转入账户')}</label>
            <div class="col-sm-8">
                <div class="suggest-search-box">
                    <div class="input-group to-account-suggest">
                        <input type="hidden" name="to_account_id" value="{$info.to_account_id|default=''}">
                        <input type="text" name="to_account_name"
                               value="{$info.to_account_name|default=''}"
                               class="form-control suggest-input" placeholder="{:lang('选择账户')}"
                               data-url="{:url('Comm/suggest_search',array('datatype'=>'account','type'=>'1'))}"
                               searchFields="keywords"
                               target-group="to-account-suggest"
                               target-name='{"to_account_id":"id","to_account_name":"name"}'>
                        <div class="input-group-btn">
                            <button type="button" class="btn btn-default dropdown-toggle"
                                    data-toggle="dropdown">
                                <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-right" role="menu"></ul>
                        </div>
                    </div>
                </div>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('转账金额')}</label>
            <div class="col-sm-8">
                <input name="amount" class="form-control" type="text" value="{$info.amount|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('转账时间')}</label>
            <div class="col-sm-8">
                <input type="text" name="transfer_date" class="form-control datepicker"
                       value="{$info.transfer_date|default=''|format_time='Y-m-d'}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('备注')}</label>
            <div class="col-sm-8">
                <input type="text" name="remark" class="form-control" value="{$info.remark|default=''}">
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                <button type="submit" class="btn btn-info no-repeat-button ajax-post"
                        data-style="slide-up" target-form="form-horizontal"
                        data-loading-text="Loading...">
                    <span class="ladda-label"><i class="fa fa-send"></i> {:lang('确定')} </span>
                </button>
            </div>
        </div>
    </form>
</div>

{include file="bookkeep/_bk_transaction/fun"}
