<div class="ibox-content auto-height-box">
    <form class="form-horizontal" method="post" action="{:url('BkShop/add')}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('商家名称')}</label>
            <div class="col-sm-10">
                <input name="name" class="form-control" type="text"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('联系人')}</label>
            <div class="col-sm-10">
                <input name="contact" class="form-control" type="text" placeholder="" value="{$info.contact|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('联系电话')}</label>
            <div class="col-sm-10">
                <input name="phone" class="form-control" type="text" placeholder="" value="{$info.phone|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('地址')}</label>
            <div class="col-sm-10">
                <input name="address" class="form-control" type="text" placeholder="" value="{$info.address|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('排序')}</label>
            <div class="col-sm-10">
                <input name="sort" class="form-control" type="text" placeholder="" value="{$info.sort|default='0'}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('备注说明')}</label>
            <div class="col-sm-10">
                <textarea name="remark" class="form-control" rows="3">{$info.remark|default=''}</textarea>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
