<div class="ibox-content auto-height-box">
    <form class="form-horizontal" method="post" action="{:url('BkCategory/edit')}">
        <input type="hidden" name="id" value="{$info.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('分类名称')}</label>
            <div class="col-sm-10">
                <input name="name" class="form-control" type="text" value="{$info.name|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('收支类型')}</label>
            <div class="col-sm-10">
                <div class="radio radio-info radio-inline">
                    <input type="radio" id="type1" value="1" name="type" {eq name="info.type" value="1"} checked{/eq}>
                    <label for="type1"> {:lang('收入')}</label>
                </div>
                <div class="radio radio-info radio-inline">
                    <input type="radio" id="type-1" value="-1" name="type" {eq name="info.type" value="-1"} checked{/eq}>
                    <label for="type-1"> {:lang('支出')}</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('图标')}</label>
            <div class="col-sm-10">
                <input name="category_icon" class="form-control" type="text" value="{$info.category_icon|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('排序')}</label>
            <div class="col-sm-10">
                <input name="sort" class="form-control" type="text" placeholder="" value="{$info.sort|default='0'}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
{include file="bk_category/iconfont"}
