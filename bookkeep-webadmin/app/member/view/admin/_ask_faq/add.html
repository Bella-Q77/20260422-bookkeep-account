<div class="ibox-content">
    <form class="form-horizontal" method="post" action="{:url('admin.AskFaq/add')}">
        <input type="hidden" name="bus_type" value="{$bus_type|default=''}">
        <input type="hidden" name="bus_id" value="{$bus_id|default=''}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('问题标题')}</label>
            <div class="col-sm-10">
                <input name="name" class="form-control">
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('沟通内容')}</label>
            <div class="col-sm-10">
                <textarea name="content" class="form-control" rows="5"></textarea>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
