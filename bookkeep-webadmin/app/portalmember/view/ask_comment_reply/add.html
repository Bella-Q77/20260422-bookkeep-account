<div class="ibox-content">
    <form class="form-horizontal" method="post" action="{:url('AskCommentReply/add')}">
        <input type="hidden" name="bus_type" value="{$info.bus_type|default=''}">
        <input type="hidden" name="bus_id" value="{$info.bus_id|default=''}">
        <input type="hidden" name="receive_user_id" value="{$info.receive_user_id|default='0'}">
        <input type="hidden" name="comment_id" value="{$info.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('评论内容')}</label>
            <div class="col-sm-10">
                <textarea name="content" class="form-control" rows="6" placeholder="回复{$info.receive_user_name|default=''}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
