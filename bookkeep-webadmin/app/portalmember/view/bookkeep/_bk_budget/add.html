<div class="ibox-title">{:lang('添加预算')}</div>
<div class="ibox-content auto-height-box">
    <form class="form-horizontal" method="post" action="{:url('bookkeep.BkBudget/add')}">
        <input type="hidden" name="period_type" value="{$period_type|default='month'}"/>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('预算金额')}</label>
            <div class="col-sm-10">
                <input name="amount" class="form-control" type="text" value="{$info.amount|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('开始周期')}</label>
            <div class="col-sm-10">
                <input name="start_date" class="form-control datepicker" type="text" value="{$info.start_date|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('结束周期')}</label>
            <div class="col-sm-10">
                <input name="end_date" class="form-control datepicker" type="text" value="{$info.end_date|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
