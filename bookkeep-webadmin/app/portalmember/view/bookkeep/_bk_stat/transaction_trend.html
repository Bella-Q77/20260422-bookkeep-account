<div class="wrapper wrapper-content ">
    <div class="ibox-content">
        <div class="row">
            <div class="col-sm-10">
                <div class="input-group">
                    <div data-toggle="buttons" class="btn-group">
                        <label class="btn btn-sm btn-info btn-outline active">
                            <input type="radio" value="month" name="period_type" checked>{:lang('本月')}
                        </label>
                        <label class="btn btn-sm btn-info btn-outline">
                            <input type="radio" value="year" name="period_type">{:lang('本年')}
                        </label>
                        <label class="btn btn-sm btn-info btn-outline">
                            <input type="radio" value="diy" name="period_type">{:lang('自定义')}
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" name="period_date"
                           class="form-control stat-workbench-date"
                           value="{$rangedate|default=''}">
                </div>
            </div>
            <div class="col-sm-1">
                <button class="btn btn-info stat-workbench-btn">{:lang('查询')}</button>
            </div>
        </div>
    </div>
    <!--收支趋势-->
    <div class="row workbench-ajax incomeexpensetrend" data-url="{:url('bookkeep.BkStat/index')}" data-type="incomeexpensetrend" data-gid="incomeexpensetrend">
        <div class="col-sm-12">
            <div class="ibox-content">
                <div class="row">
                    <div class="col-sm-6">
                        <h4>收支趋势</h4>
                    </div>
                    <div class="col-sm-6 text-right">

                    </div>
                </div>
                <div class="row m-t-xs">
                    <div class="col-sm-12">
                        <div class="ibox-content">
                            <div id="workbench-incomeexpensetrend" data-type="line" class="statistics-box" style="height: 300px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--支出分类,收入分类-->
    <div class="row m-t-xs">
        <div class="col-sm-6">
            <!--支出分类分析-->
            <div class="ibox-content  workbench-ajax categoryexpense" data-url="{:url('bookkeep.BkStat/index')}" data-type="categoryexpense">
                <h4>支出分类</h4>
                <div id="workbench-categoryexpense" data-type="pie" class="statistics-box" style="height: 400px;"></div>
            </div>
        </div>

        <div class="col-sm-6">
            <!--收入分类占比-->
            <div class="ibox-content  workbench-ajax categoryincome" data-url="{:url('bookkeep.BkStat/index')}" data-type="categoryincome">
                <h4>收入分类</h4>
                <div id="workbench-categoryincome" data-type="pie" class="statistics-box" style="height: 400px;"></div>
            </div>
        </div>

    </div>

</div>
<!--加载数据模板-->
{include file="bookkeep/_bk_stat/js_function"/}
