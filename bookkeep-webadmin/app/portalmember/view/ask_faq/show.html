<body class="gray-bg">
<div class="wrapper wrapper-content animated ">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>{:lang('问题列表')}</h5>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <form id="pagerForm" method="post" class="form-inline searchForm">
                            <input type="hidden" name="listtype" value="{$listtype|default='selfson'}">
                            <div class="col-sm-12">
                                <div class="input-group">
                                    <input type="text" name="keywords" placeholder="输入关键字搜索"
                                           class="form-control">
                                </div>
                                <div class="input-group">
                                    <span class="input-group-btn">
                                        <button type="button" class="btn btn-primary ajaxSearchForm"><i
                                            class="fa fa-search"></i> {:lang('搜索')}
                                        </button>
                                    </span>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-btn">
                                        <button type="button"  class="btn btn-warning ajaxSearchForm resetForm"><i
                                            class="fa fa-recycle"></i> {:lang('重置')}
                                        </button>
                                    </span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="ibox">
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-sm-10">
                            <lqf_link>
                                <a class="btn btn-info ajax-open" data-url="{:url('AskFaq/add')}" width="800" height="500">
                                    <i  class="fa fa-plus"></i> {:lang('添加')}</a>
                            </lqf_link>
                        </div>
                        <div class="col-sm-2 text-right">
                        </div>
                    </div>
                </div>
                <div class="ibox-content table-responsive">
                    <table class="table table-hover sorttable ajax-list-table" data-url="{:url('AskFaq/show_json')}"
                           width="100%">
                        <thead>
                        <tr>
                            <th width="22"><input type="checkbox" group="ids" class="checkboxCtrl"></th>
                            <th width=""><span>{:lang('问题标题')}</span></th>
                            <th width="150" class="text-center"><span>{:lang('处理回复')}</span></th>
                            <th width="150" class="text-center"><span>{:lang('创建时间')}</span></th>
                            <th width="120" class="text-center">{:lang('操作')}</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                    <table class="table ajax-list-table table-page-bar">
                        <tfoot>
                        <tr>
                            <td align="center"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script id="tableListTpl" type="text/html">
    <% for(var i=0;i<data.length;i++) {%>
    <tr>
        <td><input name="id" class="checkboxCtrlId" value="<%=data[i]['id']%>" type="checkbox"></td>
        <td>
            <a class="ajax-open" data-url="{:url('AskFaq/detail')}" data-ids="{'id':'<%=data[i]['id']%>'}"
               data-title="详细">
                <%=data[i]['name']%>
            </a>
        </td>
        <td class="text-center"><%:=data[i]['status_text']%></td>
        <td class="text-center"><%=data[i]['create_time']%></td>
        <td class="text-center">

            <lqf_link><a class="ajax-open" data-url="{:url('AskFaq/edit')}"
                         data-ids="{'id':'<%=data[i]['id']%>'}" width="800" height="500"
                         data-title="{:lang('修改')}">{:lang('修改')}</a></lqf_link>
            <lqf_link><a class="ajax-del confirm" data-url="{:url('AskFaq/del')}"
                         data-ids="{'id':'<%=data[i]['id']%>'}">{:lang('删除')}</a></lqf_link>

        </td>
    </tr>
    <% } %>
</script>
<script type="text/javascript">
    $(document).ready(function () {
        turnPage(1);
    });
</script>
