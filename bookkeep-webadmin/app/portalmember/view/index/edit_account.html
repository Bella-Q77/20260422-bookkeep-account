<div class="ibox-content">
    <form class="form-horizontal" method="post" action="{:url('index/edit_account')}">
        <input type="hidden" name="id" value="{$info.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">帐号名称</label>
            <div class="col-sm-10">
                <input name="account" class="form-control" type="text" placeholder="请输入账号必须填写" value="{$info.account|default=''}" readonly/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">帐号密码</label>
            <div class="col-sm-10">
                <input name="password" class="form-control" type="text" placeholder="帐号密码" value="{$info.password|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">真实姓名</label>
            <div class="col-sm-10">
                <input name="realname" class="form-control" type="text" placeholder="请输入账号真实姓名" value="{$info.realname|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">邮箱</label>
            <div class="col-sm-10">
                <input name="email" class="form-control" type="text" placeholder="请输入邮箱" value="{$info.email|default=''}" />
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">电话</label>
            <div class="col-sm-10">
                <input name="tel" class="form-control" type="text" placeholder="请输入账号电话" value="{$info.tel|default=''}"/>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">备注说明</label>
            <div class="col-sm-10">
                <textarea name="remark" class="form-control">{$info.remark|default=''}</textarea>
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
