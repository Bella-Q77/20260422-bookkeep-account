<div class="ibox-content">
    <form class="form-horizontal" method="post" action="{:url('index/edit_pwd')}">
        <input type="hidden" name="id" value="{$info.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('accounts')}</label>
            <div class="col-sm-8">
                <input name="username" class="form-control" type="text" placeholder="{:lang('accounts')}" value="{$info['username']|default=''}"  readonly/>
                <span class="help-block m-b-none"></span> </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('old password')}</label>
            <div class="col-sm-8">
                <input name="old_password" class="form-control" type="password" placeholder="{:lang('old password')}" value=""/>
                <span class="help-block m-b-none"></span> </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('new password')}</label>
            <div class="col-sm-8">
                <input name="password" class="form-control" type="password" placeholder="{:lang('new password')}" value=""/>
                <span class="help-block m-b-none"></span> </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{:lang('confirm password')}</label>
            <div class="col-sm-8">
                <input name="password_confirm" class="form-control" type="password" placeholder="{:lang('confirm password')}" value=""/>
                <span class="help-block m-b-none"></span> </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
