<body class="gray-bg">
<div class="ibox-title">
    <h5>编辑会员信息</h5>
</div>
<div class="ibox-content">
    <form class="form-horizontal" method="post" action="{:url('Member/editInfo')}">
        <input type="hidden" name="id" value="{$member.id|default='0'}">
        <div class="form-group">
            <label class="col-sm-2 control-label">帐号</label>
            <div class="col-sm-10">
                <input name="username" class="form-control" type="text" placeholder="请输入帐号" required value="{$member.username}" readonly/>
                <span class="help-block m-b-none"></span></div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">呢称</label>
            <div class="col-sm-10">
                <input name="nickname" class="form-control" type="text" placeholder="请输入呢称" required value="{$member.nickname}"/>
                <span class="help-block m-b-none"></span></div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">手机</label>
            <div class="col-sm-10">
                <input name="mobile" class="form-control" type="text" placeholder="请输入手机" required value="{$member.mobile}"/>
                <span class="help-block m-b-none"></span></div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">邮箱</label>
            <div class="col-sm-10">
                <input name="email" class="form-control" type="text" placeholder="请输入邮箱" required value="{$member.email}"/>
                <span class="help-block m-b-none"></span></div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">QQ</label>
            <div class="col-sm-10">
                <input name="qicq" class="form-control" type="text" placeholder="请输入qq" required value="{$member.qicq}"/>
                <span class="help-block m-b-none"></span></div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-8">
                {include file="admin@layout/save_btn"}
            </div>
        </div>
    </form>
</div>
